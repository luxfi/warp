name: Docker
on:
  workflow_dispatch:
  push:
    branches: [main, dev, test]
    tags: ['v*']

permissions:
  contents: read
  packages: write

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/luxfi/warp
      runner-amd64: luxfi-amd64
      runner-arm64: luxfi-arm64
      runner-deploy: lux-deploy-linux-amd64
    secrets: inherit
